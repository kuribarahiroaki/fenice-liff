<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FENICE 会員登録</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', sans-serif; background: #f5f5f5; }
    .container { max-width: 390px; margin: 0 auto; padding: 24px 16px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 28px; letter-spacing: 4px; color: #1a1a1a; }
    .logo p { font-size: 12px; color: #888; margin-top: 4px; }
    .card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 600; }
    input, select { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 16px; outline: none; }
    input:focus, select:focus { border-color: #1a1a1a; }
    .btn { width: 100%; padding: 16px; background: #1a1a1a; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .btn:disabled { background: #ccc; }
    .note { font-size: 11px; color: #aaa; text-align: center; margin-top: 16px; line-height: 1.6; }
    .success { text-align: center; padding: 40px 20px; }
    .success .icon { font-size: 64px; margin-bottom: 16px; }
    .success h2 { font-size: 20px; margin-bottom: 8px; }
    .success p { color: #888; font-size: 14px; }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>FENICE</h1>
    <p>会員登録</p>
  </div>

  <div id="registerForm" class="card">
    <div class="form-group">
      <label>お名前 *</label>
      <input type="text" id="name" placeholder="山田 花子">
    </div>
    <div class="form-group">
      <label>電話番号 *</label>
      <input type="tel" id="phone" placeholder="090-1234-5678">
    </div>
    <div class="form-group">
      <label>生年月日</label>
      <input type="date" id="birthday">
    </div>
    <div class="form-group">
      <label>ご利用店舗 *</label>
      <select id="store">
        <option value="">選択してください</option>
      </select>
    </div>
    <button class="btn" id="submitBtn" onclick="register()">登録する</button>
    <p class="note">登録情報はFENICEグループの顧客管理にのみ使用します</p>
  </div>

  <div id="successView" class="success" style="display:none">
    <div class="icon">✅</div>
    <h2>登録完了しました</h2>
    <p>ありがとうございます<br>次回来店からスタンプが貯まります</p>
  </div>
</div>

<script>
 const SUPABASE_URL = 'https://nwjegiadertslklnjpvq.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_GWrE0p2OJFQMsrjhczccAQ_-PejRNgG';
  const LIFF_ID = '2010200004-xaRYElXt';

  const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);
  let lineUserId = null;
  let defaultStoreId = null;

  async function init() {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    lineUserId = profile.userId;

    const params = new URLSearchParams(window.location.search);
    const storeParam = params.get('store');

    const { data: stores } = await db.from('stores').select('*');
    const select = document.getElementById('store');
    stores.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = s.name;
      if (s.id === storeParam) { opt.selected = true; defaultStoreId = s.id; }
      select.appendChild(opt);
    });

    const { data: existing } = await db.from('customers').select('*').eq('id', lineUserId).single();
    if (existing) {
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('successView').style.display = 'block';
      document.querySelector('#successView h2').textContent = '登録済みです';
      document.querySelector('#successView p').textContent = 'すでに会員登録が完了しています';
    }
  }

  async function register() {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const birthday = document.getElementById('birthday').value;
    const storeId = document.getElementById('store').value;

    if (!name || !phone || !storeId) { alert('必須項目を入力してください'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '登録中...';

    const { error } = await db.from('customers').insert({
      id: lineUserId,
      name, phone,
      birthday: birthday || null,
      store_id: storeId
    });

    if (error) {
      alert('エラーが発生しました');
      btn.disabled = false;
      btn.textContent = '登録する';
      return;
    }

    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('successView').style.display = 'block';
  }

  init();
</script>
</body>
</html>
